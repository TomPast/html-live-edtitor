<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Live Editor</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Layer 0: full-screen iframe — HTML preview in background -->
    <iframe id="preview" sandbox="allow-scripts"></iframe>

    <!-- Layer 1: floating editor panel with glass effect -->
    <div id="editor-panel">
      <div id="editor-toolbar">
        <div class="traffic-lights">
          <button class="tl-btn tl-close" title="Close (Ctrl+E)"></button>
          <button class="tl-btn tl-minimize" title="Minimize"></button>
          <button class="tl-btn tl-maximize" title="Maximize"></button>
        </div>
        <span class="toolbar-title">HTML Live Editor</span>
        <button id="console-toggle" title="Toggle Console (Ctrl+`)">Console</button>
      </div>
      <div id="editor-mount"></div>
      <div id="console-panel" class="hidden">
        <div id="console-toolbar">
          <span class="console-title">Console</span>
          <button id="console-clear">Clear</button>
        </div>
        <div id="console-output"></div>
      </div>
      <div id="resize-handle"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
